<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统维护公告</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .maintenance-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

            .maintenance-container::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 5px;
                background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7);
            }

        .warning-icon {
            font-size: 60px;
            color: #ff6b6b;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .time-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #ff6b6b;
        }

        .date {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }

        .description {
            color: #666;
            line-height: 1.6;
            margin: 15px 0;
            text-align: left;
        }

        .features {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
        }

            .features ul {
                padding-left: 20px;
                margin: 10px 0;
            }

            .features li {
                margin: 8px 0;
                color: #555;
            }

        .contact {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #ffeaa7;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .countdown-item {
            background: #34495e;
            color: white;
            padding: 10px;
            border-radius: 8px;
            min-width: 60px;
        }

        .countdown-value {
            font-size: 20px;
            font-weight: bold;
            display: block;
        }

        .countdown-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .status {
            background: #e74c3c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-size: 14px;
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="warning-icon">⚠️</div>
        <h1>系统维护公告</h1>

        <div class="time-info">
            <h3>维护时间</h3>
            <div class="date">2026年6月14日</div>
            <p>预计维护时长：4小时</p>
            <p>维护时段：凌晨2:00 - 凌晨6:00</p>
        </div>

        <div class="status">维护中</div>

        <div class="description">
            <h3>维护内容：</h3>
            <div class="features">
                <ul>
                    <li>服务器硬件升级与优化</li>
                    <li>数据库性能调优</li>
                    <li>安全补丁更新</li>
                    <li>系统稳定性增强</li>
                    <li>网络架构优化</li>
                </ul>
            </div>
        </div>

        <div class="description">
            <h3>影响范围：</h3>
            <p>维护期间所有服务将暂停访问，包括网站、API接口、后台管理系统等。</p>
        </div>

        <div class="contact">
            <h3>联系方式：</h3>
            <p>如有紧急情况，请联系技术支持</p>
            <p>邮箱：<a href="mailto:xiaoxiubuzhidao@163.com">xiaoxiubuzhidao@163.com</a></p>
            <p>电话：<a href="tel:15532158215">15532158215</a></p>
        </div>

        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-value" id="days">00</span>
                <span class="countdown-label">天</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="hours">00</span>
                <span class="countdown-label">时</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="minutes">00</span>
                <span class="countdown-label">分</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="seconds">00</span>
                <span class="countdown-label">秒</span>
            </div>
        </div>

        <div class="footer">
            <p>感谢您的理解与支持</p>
            <p>系统维护完成后将提供更稳定的服务体验</p>
        </div>
    </div>

    <script>
        // 计算到2026年6月14日的倒计时
        function updateCountdown() {
        const targetDate = new Date('2026-06-14T02:00:00');
        const now = new Date();
        const diff = targetDate - now;

        if (diff > 0) {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('days').textContent = days.toString().padStart(2, '0');
        document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
        document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
        document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        } else {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        }
        }

        // 初化倒计时
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
