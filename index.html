<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统维护中 - 安全警告</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-primary: #e0e0e0;
            --accent-red: #ff3b3b;
            --accent-dim: #5c1818;
            --terminal-bg: #111;
            --terminal-text: #00ff41;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景网格效果 */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 2rem;
            border: 1px solid var(--accent-dim);
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 59, 59, 0.1);
        }

        .icon-wrapper {
            margin-bottom: 1.5rem;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            fill: var(--accent-red);
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* 模拟终端窗口 */
        .terminal-window {
            background-color: var(--terminal-bg);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            text-align: left;
            height: 150px;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 2rem;
            position: relative;
        }

        .terminal-header {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .log-content {
            color: var(--terminal-text);
            opacity: 0.8;
            line-height: 1.4;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--terminal-text);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(255, 59, 59, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        footer {
            font-size: 0.8rem;
            color: #555;
            margin-top: 1rem;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255, 59, 59, 0)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(255, 59, 59, 0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255, 59, 59, 0)); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .container { padding: 1.5rem; width: 95%; }
            .terminal-window { height: 120px; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <div class="icon-wrapper">
            <!-- SVG Shield Icon -->
            <svg class="shield-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" fill-opacity="0.3"/>
            </svg>
        </div>

        <div class="status-badge">SYSTEM LOCKDOWN</div>

        <h1>服务暂时不可用</h1>
        <p class="subtitle">
            检测到异常网络流量，服务器已自动进入防御模式。<br>
            为了保障数据安全，我们暂时关闭了外部访问。
        </p>

        <div class="terminal-window">
            <div class="terminal-header">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="log-content" id="logOutput">
                > Initializing firewall protocols...<br>
            </div>
            <span class="cursor"></span>
        </div>

        <footer>
            &copy; 2026 Server Security Team. All rights reserved.<br>
            Error Code: 503 Service Unavailable
        </footer>
    </div>

    <script>
        // 模拟黑客攻击/防御日志脚本
        const logContainer = document.getElementById('logOutput');
        
        const logs = [
            "> Detecting high traffic volume from IP 192.168.x.x...",
            "> WARNING: DDoS pattern identified.",
            "> Activating WAF (Web Application Firewall)...",
            "> Blocking malicious packets...",
            "> Rerouting traffic to scrubbing center...",
            "> System integrity check: PASSED",
            "> Maintaining lockdown state...",
            "> Waiting for admin authorization..."
        ];

        let logIndex = 0;

        function addLog() {
            if (logIndex < logs.length) {
                const newLine = document.createElement('div');
                newLine.innerHTML = logs[logIndex];
                // 给不同的日志添加不同的颜色
                if(logs[logIndex].includes("WARNING")) {
                    newLine.style.color = "#ff3b3b";
                } else if (logs[logIndex].includes("PASSED")) {
                    newLine.style.color = "#00ff41";
                }
                
                logContainer.appendChild(newLine);
                
                // 自动滚动到底部
                logContainer.scrollTop = logContainer.scrollHeight;
                
                logIndex++;
                
                // 随机延迟，模拟真实处理时间
                const delay = Math.random() * 800 + 200;
                setTimeout(addLog, delay);
            } else {
                // 循环播放最后一条
                const newLine = document.createElement('div');
                newLine.innerHTML = "> Holding position...";
                logContainer.appendChild(newLine);
                logContainer.scrollTop = logContainer.scrollHeight;
                setTimeout(() => {
                    // 清理旧日志防止内存溢出（简单版）
                    if(logContainer.children.length > 10) {
                        logContainer.removeChild(logContainer.firstChild);
                    }
                    setTimeout(addLog, 2000);
                }, 2000);
            }
        }

        // 启动日志动画
        setTimeout(addLog, 1000);
    </script>
</body>
</html>
