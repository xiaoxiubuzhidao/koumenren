<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统维护中 - Server Updating</title>
    <style>
        :root {
            --primary-color: #00ffcc;
            --secondary-color: #00b3aa;
            --bg-color: #050510;
            --text-color: #e0e0ff;
            --alert-color: #ff3366;
            --dim-color: #4a5568;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景网格动画 - 更缓慢 */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 60s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.5) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.2;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 90%;
            max-width: 650px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid var(--primary-color);
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
            backdrop-filter: blur(8px);
        }

        /* 故障文字效果 */
        .glitch-title {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 2px 2px var(--alert-color);
            margin-bottom: 30px;
            letter-spacing: 6px;
            color: var(--primary-color);
        }

        .status-text {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: var(--text-color);
            line-height: 1.6;
        }

        .timer-display {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        /* 进度条容器 */
        .progress-wrapper {
            margin-bottom: 40px;
            position: relative;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(0, 255, 204, 0.1);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            transition: width 1s linear; /* 平滑过渡 */
            position: relative;
        }

        .percentage {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--dim-color);
        }

        /* 终端日志区域 */
        .terminal-window {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            border-left: 3px solid var(--primary-color);
            padding: 20px;
            height: 180px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            font-family: 'Consolas', monospace;
        }

        .log-line {
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 1s forwards;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .log-line:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--dim-color);
            margin-right: 10px;
        }

        .log-msg.info { color: #87ceeb; }
        .log-msg.success { color: var(--primary-color); }
        .log-msg.warning { color: #ffcc00; }
        .log-msg.process { color: #aaa; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .footer {
            font-size: 0.75rem;
            opacity: 0.3;
            margin-top: 30px;
            letter-spacing: 1px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .glitch-title { font-size: 1.8rem; letter-spacing: 2px; }
            .container { padding: 30px 20px; width: 95%; }
            .timer-display { font-size: 1.5rem; }
            .terminal-window { height: 150px; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="scanline"></div>

    <div class="container">
        <h1 class="glitch-title" data-text="SYSTEM MAINTENANCE">SYSTEM MAINTENANCE</h1>
        
        <div class="status-text">
            服务器正在进行大规模架构重组与数据迁移。<br>
            此过程需要较长时间，请耐心等待。
        </div>

        <div class="timer-display" id="timer">72:00:00</div>

        <div class="progress-wrapper">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="percentage">COMPLETION: <span id="percentText">0.0000</span>%</div>
        </div>

        <div class="terminal-window" id="terminal">
            <!-- 日志将在这里生成 -->
        </div>

        <div class="footer">
            SERVER ID: KM-2026-X | STATUS: OFFLINE FOR UPDATE
        </div>
    </div>

    <script>
        const progressBar = document.getElementById('progressBar');
        const percentText = document.getElementById('percentText');
        const terminal = document.getElementById('terminal');
        const timerElement = document.getElementById('timer');

        // --- 配置区域 ---
        const TOTAL_HOURS = 72;
        const TOTAL_MS = TOTAL_HOURS * 60 * 60 * 1000;
        
        // 获取开始时间。
        // 注意：为了演示效果，这里每次刷新页面都会重新开始72小时倒计时。
        // 如果您希望它在刷新后继续计数，需要使用 localStorage 存储 startTime。
        // 下面代码使用了 localStorage 逻辑，这样即使您关闭浏览器再打开，时间也是连续的。
        let startTime = localStorage.getItem('serverUpdateStartTime');
        
        if (!startTime) {
            startTime = Date.now();
            localStorage.setItem('serverUpdateStartTime', startTime);
        } else {
            startTime = parseInt(startTime);
        }

        // 模拟日志库 - 包含一些看起来很专业的术语
        const logMessages = [
            { msg: "Initializing deep storage array...", type: "info" },
            { msg: "Verifying checksums for sector 7G...", type: "process" },
            { msg: "Compressing legacy database logs...", type: "process" },
            { msg: "Optimizing neural network pathways...", type: "info" },
            { msg: "Syncing with off-site backup node [JP-Tokyo]...", type: "success" },
            { msg: "Clearing temporary cache files (45GB)...", type: "process" },
            { msg: "Updating security protocols to v9.2...", type: "warning" },
            { msg: "Re-indexing user permission tables...", type: "info" },
            { msg: "Defragmenting virtual memory blocks...", type: "process" },
            { msg: "Checking integrity of core system files...", type: "info" },
            { msg: "Applying patch #2026.11.04-Beta...", type: "success" },
            { msg: "Calibrating time-sync servers...", type: "info" },
            { msg: "Warning: High latency detected in sector 4. Retrying...", type: "warning" },
            { msg: "Migrating user session data...", type: "process" },
            { msg: "Compiling static assets...", type: "process" },
            { msg: "Running diagnostic suite A-12...", type: "info" },
            { msg: "Cooling down CPU clusters...", type: "info" },
            { msg: "Verifying encryption keys...", type: "success" },
            { msg: "Updating DNS records...", type: "process" },
            { msg: "Finalizing configuration changes...", type: "info" }
        ];

        function formatTime(ms) {
            if (ms < 0) return "00:00:00";
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            // 如果超过24小时，显示 HH:MM:SS，否则也可以显示 Days
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function getCurrentTimeStr() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', { hour12: false });
        }

        function addLog(text, type) {
            const div = document.createElement('div');
            div.className = 'log-line';
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.textContent = `[${getCurrentTimeStr()}]`;
            
            const msgSpan = document.createElement('span');
            msgSpan.className = `log-msg ${type}`;
            msgSpan.textContent = text;

            div.appendChild(timeSpan);
            div.appendChild(msgSpan);
            
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;

            // 限制日志数量，防止内存溢出
            if (terminal.children.length > 50) {
                terminal.removeChild(terminal.firstChild);
            }
        }

        let lastLogIndex = -1;

        function updateLoop() {
            const now = Date.now();
            const elapsed = now - startTime;
            
            // 计算进度
            let progress = (elapsed / TOTAL_MS) * 100;
            
            // 边界检查
            if (progress >= 100) {
                progress = 100;
                timerElement.textContent = "00:00:00";
                timerElement.style.color = "#00ff00";
                progressBar.style.background = "#00ff00";
                progressBar.style.boxShadow = "0 0 20px #00ff00";
                
                if (!document.getElementById('final-log')) {
                    addLog("System update completed successfully. Rebooting...", "success");
                    const finalLog = document.createElement('div');
                    finalLog.id = 'final-log';
                    finalLog.style.color = '#00ff00';
                    finalLog.style.marginTop = '10px';
                    finalLog.textContent = ">>> SYSTEM READY <<<";
                    terminal.appendChild(finalLog);
                }
            } else {
                const remaining = TOTAL_MS - elapsed;
                timerElement.textContent = formatTime(remaining);
                
                // 随机生成日志，模拟漫长过程中的偶尔活动
                // 概率设为非常低，模拟72小时内的稀疏活动
                if (Math.random() < 0.005) { // 每次循环(约16ms)有0.5%几率输出日志，平均几秒一条
                     // 为了避免连续输出，加一个简单的锁或间隔检查会更好，但随机性在这里足够模拟"静默"
                     const randomLog = logMessages[Math.floor(Math.random() * logMessages.length)];
                     addLog(randomLog.msg, randomLog.type);
                }
            }

            // 更新UI
            progressBar.style.width = `${progress}%`;
            percentText.textContent = progress.toFixed(4); // 显示多位小数以体现缓慢变化

            requestAnimationFrame(updateLoop);
        }

        // 初始化
        addLog("Maintenance window started.", "info");
        addLog(`Estimated duration: ${TOTAL_HOURS} hours.`, "warning");
        
        // 启动循环
        requestAnimationFrame(updateLoop);

    </script>
</body>
</html>
